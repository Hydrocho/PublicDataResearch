<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 정책 제안 헬퍼 | 공공데이터 프로젝트</title>
    <!-- Fonts -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- PapaParse for CSV -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-card glass card">
            <i data-lucide="log-in" size="48" class="icon-glow"></i>
            <h1 id="auth-title" style="margin: 20px 0; background: linear-gradient(to right, #818cf8, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">로그인</h1>
            <p class="text-muted" style="margin-bottom: 30px;">학번과 <strong>숫자 4자리</strong> PIN을 입력하세요</p>
            <form id="login-form">
                <div class="input-group" id="name-group" style="display: none;">
                    <i data-lucide="user-check"></i>
                    <input type="text" id="student-name" placeholder="이름 입력">
                </div>
                <div class="input-group">
                    <i data-lucide="user"></i>
                    <input type="text" id="student-id" placeholder="학번 입력" required>
                </div>
                <div class="input-group">
                    <i data-lucide="lock"></i>
                    <input type="password" id="password" placeholder="숫자 4자리 PIN" maxlength="4" inputmode="numeric" pattern="[0-9]*" required>
                </div>
                <p id="error-msg" style="color: var(--accent); display: none; margin-bottom: 15px; font-size: 0.9rem;"></p>
                <button type="submit" id="auth-submit-btn" class="btn-primary" style="width: 100%;">시작하기</button>
                <div style="margin-top: 20px;">
                    <button id="toggle-auth" class="btn-secondary" style="width: 100%; font-size: 0.85rem;">처음이신가요? 회원가입</button>
                </div>
                <div style="margin-top: 25px; text-align: center; display: flex; flex-direction: column; gap: 10px;">
                    <a href="#" id="guest-login-btn" style="color: var(--secondary); font-size: 0.85rem; text-decoration: none; font-weight: 600;">비회원으로 체험하기</a>
                    <a href="#" id="teacher-login-link" style="color: var(--text-muted); font-size: 0.75rem; text-decoration: none; opacity: 0.5;">교사 전용 페이지</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Main Content (Hidden initially) -->
    <div id="app-content" style="display: none;">
        <header class="app-header glass">
            <div class="logo" style="font-weight: 700; font-size: 1.2rem;">📊 AI 정책 제안 헬퍼</div>
            <div class="user-info" style="display: flex; align-items: center; gap: 20px;">
                <span id="user-display" class="text-muted">학번: 20240000</span>
                <button id="logout-btn" class="btn-secondary">로그아웃</button>
            </div>
        </header>

        <div class="main-layout">
            <nav class="side-nav glass">
                <div class="nav-header" style="margin-bottom: 30px; font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">프로젝트 단계</div>
                <div id="nav-items">
                    <!-- Nav items will be injected here -->
                </div>
                <div id="selected-topic-box" class="glass" style="margin-top: auto; padding: 15px; border: 1px dashed var(--glass-border); display: none;">
                    <small class="text-muted">현재 주제</small>
                    <p id="current-topic-text" style="font-size: 0.85rem; color: var(--secondary); margin-top: 5px;"></p>
                </div>
            </nav>

            <main class="content-area">
                <!-- Step 0: Idea Bank -->
                <section id="step-0" class="active">
                    <div id="categories-grid" class="categories-grid">
                        <!-- Categories injected here -->
                    </div>
                    <div id="category-details" class="glass" style="display: none; padding: 40px; margin-bottom: 40px;">
                        <!-- Details injected here -->
                    </div>
                </section>

                <!-- Steps 1-5 will use this container -->
                <section id="step-content-section">
                    <div id="step-canvas" class="step-container glass">
                        <!-- Step specific content injected here -->
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- Teacher Dashboard Section -->
    <section id="teacher-section" class="content-area" style="padding: 40px; display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1>👨‍🏫 교사용 관리 대시보드</h1>
            <button class="btn-secondary" onclick="location.reload()">로그아웃</button>
        </div>
        <div class="glass card" style="padding: 30px;">
            <h3 style="margin-bottom: 20px;">학생 가입 현황 및 관리</h3>
            <div id="teacher-student-list" style="overflow-x: auto;">
                <!-- Student table will be rendered here -->
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>

    <!-- Dataset Detail Modal -->
    <div id="dataset-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2 id="modal-data-name">데이터셋 이름</h2>
                <button id="close-modal" class="btn-secondary" style="padding: 5px 10px;">&times;</button>
            </div>
            <div class="modal-body">
                <div class="meta-section">
                    <h3>📌 메타 정보</h3>
                    <div id="modal-meta-content" class="meta-grid">
                        <!-- Meta items injected here -->
                    </div>
                </div>
                <div class="preview-section">
                    <h3>📄 데이터 미리보기 (상위 20행)</h3>
                    <div id="modal-data-preview" class="data-preview-table-container">
                        <p class="text-muted">데이터를 읽어오는 중...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
